server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  seat-hold:
    duration-minutes: ${SEAT_HOLD_DURATION_MINUTES:10}
    cleanup-fixed-delay-ms: ${SEAT_HOLD_CLEANUP_FIXED_DELAY_MS:30000}

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}

  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}

  queue:
    booking-confirmation:
      stream-key: ${BOOKING_CONFIRMATION_STREAM_KEY:booking-confirmation-stream}
      consumer-group: ${BOOKING_CONFIRMATION_CONSUMER_GROUP:booking-confirmation-group}
      consumer-name: ${BOOKING_CONFIRMATION_CONSUMER_NAME:booking-confirmation-worker}
      batch-size: ${BOOKING_CONFIRMATION_BATCH_SIZE:10}
      fixed-delay-ms: ${BOOKING_CONFIRMATION_FIXED_DELAY_MS:3000}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
    issuer: ${JWT_ISSUER:movie-booking-server}

spring:
  config:
    import: "optional:file:../.env[.properties]"

  application:
    name: ${APP_NAME:movie-booking-server}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  data:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    ssl:
      enabled: ${REDIS_SSL_ENABLED:false}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  flyway:
    enabled: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.flywaydb: INFO