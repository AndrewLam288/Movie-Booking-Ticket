server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}

spring:
  # Lên một cấp từ server, lấy file .env trong root và đọc như một file properties để lấy các biến môi trường.
  config:
    import: "optional:file:../.env[.properties]"

  application:
    name: ${APP_NAME:movie-booking-server}

  security:
    jwt:
      # Signing secret from env
      secret: ${JWT_SECRET}
      # access-token-expiration-ms = token lifetime
      access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
      #identifies who created the token
      issuer: ${JWT_ISSUER:movie-booking-server}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  flyway:
    enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.flywaydb: INFO


